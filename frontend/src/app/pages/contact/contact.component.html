<section class="contact-page">
  <div class="contact-container">
    <div class="contact-info">
      <h1>Contact Us</h1>
      <p>Have a question about your order, sizing, or a drop? We're here to help.</p>
      
      <div class="info-block">
        <h4>Email</h4>
        <p>support&#64;kizenwear.com</p>
      </div>
      
      <div class="info-block">
        <h4>Social</h4>
        <p>&#64;kizenwear on Instagram</p>
      </div>
    </div>
    
    <form class="contact-form" (submit)="onSubmit($event)">
      <div class="form-group">
        <label>Name</label>
        <input type="text" placeholder="Your Name">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="Your Email">
      </div>
      <div class="form-group">
        <label>Message</label>
        <textarea placeholder="How can we help?" rows="5"></textarea>
      </div>
      <button type="submit" class="btn">Send Message</button>
    </form>
  </div>
</section>
